apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: filegrab
        metrics_path: /metrics
        static_configs:
          - targets: ['filegrab.default.svc.cluster.local:5000']
      - job_name: pdf-to-image
        static_configs:
          - targets: ['pdf-to-image.default.svc.cluster.local:8000']
      - job_name: preprocessing
        static_configs:
          - targets: ['preprocessing.default.svc.cluster.local:8000']
      - job_name: ocr
        static_configs:
          - targets: ['ocr.default.svc.cluster.local:8000']
      - job_name: text-aggregation
        static_configs:
          - targets: ['text-aggregation.default.svc.cluster.local:8000']
      - job_name: node-exporter
        static_configs:
          - targets: ['node-exporter.monitoring.svc.cluster.local:9100']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.54.1
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    nodePort: 30900
    name: http
