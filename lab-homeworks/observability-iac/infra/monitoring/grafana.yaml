apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: ocr-dashboard
        orgId: 1
        folder: OCR Pipeline
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: monitoring
data:
  ocr-dashboard.json: |
    {
      "title": "OCR Pipeline Observability",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "15s",
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "type": "timeseries",
          "title": "Component execution latency",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(component_execution_seconds_sum[5m])) by (job) / sum(rate(component_execution_seconds_count[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Upload to finish latency",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(document_upload_to_finish_seconds_sum[5m])) by (job) / sum(rate(document_upload_to_finish_seconds_count[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Document total work time",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(document_total_work_seconds_sum) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Pages processed",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(document_page_count_sum) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Node CPU usage",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "100 * (1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) by (instance))",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Node memory usage",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Process memory usage",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "process_resident_memory_bytes",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Process CPU usage",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "targets": [
            {
              "expr": "rate(process_cpu_seconds_total[5m])",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod CPU usage",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"default\", container!=\"\", pod=~\"filegrab.*|pdf-to-image.*|preprocessing.*|ocr.*|text-aggregation.*\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod memory usage",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"default\", container!=\"\", pod=~\"filegrab.*|pdf-to-image.*|preprocessing.*|ocr.*|text-aggregation.*\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Upload requests and failures",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 40 },
          "targets": [
            {
              "expr": "sum(rate(upload_requests_total[5m])) by (job)",
              "legendFormat": "requests {{job}}"
            },
            {
              "expr": "sum(rate(upload_failures_total[5m])) by (job)",
              "legendFormat": "failures {{job}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Component successes and failures",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 40 },
          "targets": [
            {
              "expr": "sum(rate(component_success_total[5m])) by (job)",
              "legendFormat": "success {{job}}"
            },
            {
              "expr": "sum(rate(component_failures_total[5m])) by (job)",
              "legendFormat": "failure {{job}}"
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:11.1.4
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        volumeMounts:
        - name: datasource
          mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
          subPath: datasource.yaml
        - name: provider
          mountPath: /etc/grafana/provisioning/dashboards/provider.yaml
          subPath: provider.yaml
        - name: dashboard
          mountPath: /var/lib/grafana/dashboards/ocr-dashboard.json
          subPath: ocr-dashboard.json
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
      volumes:
      - name: datasource
        configMap:
          name: grafana-datasource
      - name: provider
        configMap:
          name: grafana-dashboard-provider
      - name: dashboard
        configMap:
          name: grafana-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300
    name: http
