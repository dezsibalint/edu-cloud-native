apiVersion: apps/v1
kind: Deployment
metadata:
  name: text-aggregation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: text-aggregation
  template:
    metadata:
      labels:
        app: text-aggregation
    spec:
      containers:
      - name: text-aggregation
        image: text-aggregation:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: ocr-services-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"