apiVersion: apps/v1
kind: Deployment
metadata:
  name: text-aggregation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: text-aggregation
  template:
    metadata:
      labels:
        app: text-aggregation
    spec:
      containers:
      - name: text-aggregation
        image: text-aggregation:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: metrics
        envFrom:
        - configMapRef:
            name: ocr-services-config
        env:
        - name: METRICS_PORT
          value: "8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"