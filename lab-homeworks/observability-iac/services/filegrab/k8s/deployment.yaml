apiVersion: apps/v1
kind: Deployment
metadata:
  name: filegrab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filegrab
  template:
    metadata:
      labels:
        app: filegrab
    spec:
      containers:
      - name: filegrab
        image: filegrab:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: ocr-services-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "20m"
          limits:
            memory: "128Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
